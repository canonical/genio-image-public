name: baoshan
display-name: Ubuntu Desktop (baoshan) arm64
revision: 1
architecture: arm64
series: noble
class: preinstalled
kernel: linux-mtk
gadget:
  url: 'file://../../gadget/baoshan'
  branch: classic
  type: directory
rootfs:
  mirror: "http://ports.ubuntu.com/ubuntu-ports/"
  pocket: updates
  components:
    - main
    - restricted
    - multiverse
    - universe
  seed:
    urls:
      - "https://git.launchpad.net/~baoshan-team/ubuntu-seeds/+git/"
    branch: noble
    names:
      - mediatek-genio-common
      - desktop
      - desktop-minimal
      - desktop-mediatek-genio
      - minimal
      - standard
      - supported-mediatek-genio-common
  sources-list-deb822: true
customization:
  cloud-init:
    user-data: |
      #cloud-config
      chpasswd:
        expire: false
        users:
          - name: ubuntu
            password: ubuntu
            type: text
    meta-data: |
      dsmode: local
      instance_id: ubuntu-desktop
  extra-ppas: []
  extra-packages:
    - name: oem-baoshan-genio-desktop-meta
  extra-snaps:
    - name: firefox
      channel: stable/ubuntu-24.04
  manual:
    make-dirs:
      - path: /boot/grub
        permissions: 0755
  fstab:
    - label: writable
      mountpoint: /
      filesystem-type: ext4
      mount-options: rw,relatime
      dump: false
      fsck-order: 1
    - label: system-boot
      mountpoint: /boot/efi
      filesystem-type: vfat
      mount-options: umask=0077
      dump: false
      fsck-order: 2
artifacts:
  img:
    - name: ubuntu-desktop.img
  manifest:
    name: ubuntu-desktop.manifest
