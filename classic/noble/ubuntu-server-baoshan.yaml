name: baoshan
display-name: Ubuntu Server (baoshan) arm64
revision: 1
architecture: arm64
series: noble
class: preinstalled
kernel: linux-mtk
gadget:
  url: 'file://../../gadget/baoshan'
  branch: classic
  type: directory
rootfs:
  mirror: "http://ports.ubuntu.com/ubuntu-ports/"
  pocket: updates
  components:
    - main
    - restricted
    - multiverse
    - universe
  seed:
    urls:
      - "https://git.launchpad.net/~ubuntu-core-dev/ubuntu-seeds/+git/"
    branch: noble
    names:
      - cloud-image
      - minimal
      - server
      - standard
  sources-list-deb822: true
customization:
  cloud-init:
    user-data: |
      #cloud-config
      chpasswd:
        expire: false
        users:
          - name: ubuntu
            password: ubuntu
            type: text
      runcmd:
      - |
          sector_size=$(lsblk $(findmnt -n -o SOURCE /) -o PHY-SeC -n | tr -d '[:space:]')
          if [ "$sector_size" -eq 512 ]; then
              echo "$(find /dev/disk/by-path/*boot1) 0x0 0x1000" > /etc/fw_env.config
          else
              # A temporary workaround agreed by Mediatek, we may
              # need a better mechanism to access the correct path
              echo "/dev/sdb 0x0 0x2000" > /etc/fw_env.config
          fi
    meta-data: |
      dsmode: local
      instance_id: ubuntu-server
  extra-ppas: []
  extra-packages:
    # FIXME using extra-packages as a workaround for missing bits to make the
    # system bootable that should be pulled by seeds or metapackages
    # signed EFI boot chain
    - name: grub-efi-arm64-signed
    - name: shim-signed
    # for update-grub
    - name: grub2-common
    ## Core packages required for the platform
    # common packages for Genio platforms
    - name: linux-firmware-mediatek-genio
    - name: mediatek-mdpd
    - name: mediatek-vpud
    - name: mediatek-genio-defaults
    # useful system utilities
    - name: u-boot-tools
    ## Packages required for Ubuntu IoT base on server seeds (No need for Ubuntu Desktop image)
    # useful for network setting
    - name: wpasupplicant
    # support bluetooth
    - name: bluez
    # enable ALSA
    - name: alsa-ucm-conf
  extra-snaps:
    - name: snapd
    - name: core24
  manual:
    make-dirs:
      - path: /boot/grub
        permissions: 0755
  fstab:
    - label: writable
      mountpoint: /
      filesystem-type: ext4
      mount-options: rw,relatime
      dump: false
      fsck-order: 1
    - label: system-boot
      mountpoint: /boot/efi
      filesystem-type: vfat
      mount-options: umask=0077
      dump: false
      fsck-order: 2
artifacts:
  img:
    - name: ubuntu-server.img
  manifest:
    name: ubuntu-server.manifest
