name: baoshan
display-name: Ubuntu Server (baoshan) arm64
revision: 1
architecture: arm64
series: noble
class: preinstalled
kernel: linux-mtk
gadget:
  url: 'file://../../gadget/baoshan'
  branch: classic
  type: directory
rootfs:
  mirror: "http://ports.ubuntu.com/ubuntu-ports/"
  pocket: updates
  components:
    - main
    - restricted
    - multiverse
    - universe
  seed:
    urls:
      - "https://git.launchpad.net/~ubuntu-core-dev/ubuntu-seeds/+git/"
    branch: noble
    names:
      - cloud-image
      - minimal
      - server
      - standard
  sources-list-deb822: true
customization:
  cloud-init:
    user-data: |
      #cloud-config
      chpasswd:
        expire: false
        users:
          - name: ubuntu
            password: ubuntu
            type: text
    meta-data: |
      dsmode: local
      instance_id: ubuntu-server
  extra-ppas: []
  extra-packages:
    # FIXME using extra-packages as a workaround for missing bits to make the
    # system bootable that should be pulled by seeds or metapackages
    # signed EFI boot chain
    - name: grub-efi-arm64-signed
    - name: shim-signed
    - name: grub2-common
    - name: linux-firmware-mediatek-genio
    - name: mediatek-mdpd
    - name: mediatek-vpud
    - name: mediatek-genio-defaults
  extra-snaps:
    - name: snapd
    - name: core24
  manual:
    make-dirs:
      - path: /boot/grub
        permissions: 0755
  fstab:
    - label: writable
      mountpoint: /
      filesystem-type: ext4
      mount-options: rw,relatime
      dump: false
      fsck-order: 1
    - label: system-boot
      mountpoint: /boot/efi
      filesystem-type: vfat
      mount-options: umask=0077
      dump: false
      fsck-order: 2
artifacts:
  img:
    - name: ubuntu-server.img
  manifest:
    name: ubuntu-server.manifest
