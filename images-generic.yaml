# images-generic.yaml - Configuration for generic (linux-generic kernel) image builds
version: 1.0
platforms:
  genio:
    description: 'MediaTek Genio platforms'
    arch: arm64
    series:
      resolute:
        configurations:
          - type: server
            suffix: emmc
            model: ubuntu-server-generic.yaml
            kernel: linux-generic
            gadget: baoshan
            hooks: genio
            sector_size: "512"
          - type: server
            suffix: ufs
            model: ubuntu-server-generic.yaml
            kernel: linux-generic
            gadget: baoshan
            hooks: genio
            sector_size: "4096"
          - type: desktop
            suffix: emmc
            model: ubuntu-desktop-generic.yaml
            kernel: linux-generic
            gadget: baoshan
            hooks: genio
            sector_size: "512"
          - type: desktop
            suffix: ufs
            model: ubuntu-desktop-generic.yaml
            kernel: linux-generic
            gadget: baoshan
            hooks: genio
            sector_size: "4096"
      devel:
        # The `devel` series is automatically replaced with the latest development release at build time.
        configurations:
          - type: server
            suffix: emmc
            model: ubuntu-server-generic.yaml
            kernel: linux-generic
            gadget: baoshan
            hooks: genio
            sector_size: "512"
          - type: server
            suffix: ufs
            model: ubuntu-server-generic.yaml
            kernel: linux-generic
            gadget: baoshan
            hooks: genio
            sector_size: "4096"
          - type: desktop
            suffix: emmc
            model: ubuntu-desktop-generic.yaml
            kernel: linux-generic
            gadget: baoshan
            hooks: genio
            sector_size: "512"
          - type: desktop
            suffix: ufs
            model: ubuntu-desktop-generic.yaml
            kernel: linux-generic
            gadget: baoshan
            hooks: genio
            sector_size: "4096"
