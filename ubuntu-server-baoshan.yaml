name: baoshan
display-name: Ubuntu Server (baoshan) arm64
revision: 1
architecture: arm64
series: noble
class: preinstalled
kernel: linux-mtk
gadget:
  url: "https://git.launchpad.net/~kxuan/+git/baoshan-gadget"
  type: git
  branch: classic24.04-dev
  target: classic
rootfs:
  mirror: "http://ports.ubuntu.com/ubuntu-ports/"
  pocket: updates
  components:
    - main
    - restricted
    - multiverse
    - universe
  seed:
    urls:
      - "https://git.launchpad.net/~baoshan-team/ubuntu-seeds/+git/"
    branch: noble
    names:
      - cloud-image
      - mediatek-genio-common
      - minimal
      - server
      - server-mediatek-genio
      - standard
      - supported-mediatek-genio-common
  sources-list-deb822: true
customization:
  cloud-init:
    user-data: |
      #cloud-config
      chpasswd:
        expire: false
        users:
          - name: ubuntu
            password: ubuntu
            type: text
    meta-data: |
      dsmode: local
      instance_id: ubuntu-server
  extra-ppas:
    - name: baoshan-ppa/baoshan-updates
      # Please replace #{PPA_AUTH_BAOSHAN_UPDATES}# to a valid access token
      auth: #{PPA_AUTH_BAOSHAN_UPDATES}#
      fingerprint: 703A0CD379B768B77C1BA91FDD3EC3B6C6D209D1
  extra-snaps:
    - name: core22
    - name: lxd
  manual:
    make-dirs:
      - path: /boot/grub
        permissions: 0755
  fstab:
    - label: writable
      mountpoint: /
      filesystem-type: ext4
      mount-options: rw,relatime
      dump: false
      fsck-order: 1
    - label: system-boot
      mountpoint: /boot/efi
      filesystem-type: vfat
      mount-options: umask=0077
      dump: false
      fsck-order: 2
artifacts:
  img:
    - name: ubuntu-server.img
  manifest:
    name: ubuntu-server.manifest
